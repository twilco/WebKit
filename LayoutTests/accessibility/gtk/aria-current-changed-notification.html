<html>
<head>
<script src="../../resources/accessibility-helper.js"></script>
<script src="../../resources/js-test.js"></script>
</head>
<body>
<div id="content" role="list" tabindex="0">
  <div id="item1" role="listitem">1</div>
  <div id="item2" role="listitem" aria-current="page">2</div>
  <div id="item3" role="listitem">3</div>
</div>

<p id="description"></p>
<div id="console"></div>
<script>
window.jsTestIsAsync = true;
var output = "This tests that changing the aria-current value results in a state-changed notification.\n\n";

if (window.testRunner && window.accessibilityController) {
    var notificationCount = 0;
    accessibilityController.addNotificationListener(function(element, notification) {
        if (notification != "ActiveStateChanged")
            return;
        output += `${notification}: ${element.title} ${element.role}\n`;
        ++notificationCount;
    });

    document.getElementById("content").focus();

    var item1 = accessibilityController.accessibleElementById("item1");
    output += expect("item1.currentStateValue", "'false'");
    var item2 = accessibilityController.accessibleElementById("item2");
    output += expect("item2.currentStateValue", "'page'");
    var item3 = accessibilityController.accessibleElementById("item3");
    output += expect("item3.currentStateValue", "'false'");

    output += "Setting aria-current to false on item2.\n";
    document.getElementById("item2").setAttribute("aria-current", "false");

    output += "Setting aria-current to page on item3.\n";
    document.getElementById("item3").setAttribute("aria-current", "page");

    window.setTimeout(async function() {
        await waitFor(() => {
            return notificationCount == 2;
        });
        document.getElementById("content").style.visibility = "hidden";

        output += expect("item1.currentStateValue", "'false'");
        output += expect("item2.currentStateValue", "'false'");
        output += expect("item3.currentStateValue", "'page'");

        accessibilityController.removeNotificationListener();
        debug(output);
        finishJSTest();
    }, 0);
}
</script>
</body>
</html>
